name: Build

on:
  pull_request:
    branches:
      - OSC-MIGRATION
      - main
    paths:
      - "**.go"
      - "**.yaml"
      - "Dockerfile"
      - ".trivyignore"
      - "Makefile"
      - "go.*"
      - ".github/workflows/build.yml"
      - "!tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
    - name: 🔎 Docker lint
      run: bash -c "make dockerlint"
    - name: 🔎 golangci-lint
      uses: outscale/goutils/.github/actions/lint@main
    - name: 🔎 Reuse check
      run: make lint-reuse
  unit-test:
    runs-on: ubuntu-22.04
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
    - name: ⬇️ Install Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
      with:
        go-version-file: 'go.mod'
    - name: 🧪 Test
      run: make test
  docs:
    runs-on: ubuntu-22.04
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
    - name: 🔎 Check docs
      run: bash -c "make check-helm-docs"
  trivy:
    runs-on: ubuntu-22.04
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
    - name: 📦 Build image
      run: bash -c "make build-image"
    - name: 🔎 Trivy-Scan
      run: bash -c "make trivy-scan"
    - name: 🔎 Trivy-Ignore-Check
      run: bash -c "make trivy-ignore-check"
    - name: ⬆️ Upload result
      if: ${{ always() && github.event_name != 'pull_request' }}
      uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4
      with:
        sarif_file: './.trivyscan/report.sarif'
