kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: osc-csi-node-role-v0
  labels:
    {{- include "osc-bsu-csi-driver.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch"]
